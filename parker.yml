name: Avantpark Auto Check-in

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-in:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Hent kode
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer afhængigheder
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Kør check-in
        env:
          NUMMERPLADER: ${{ secrets.NUMMERPLADER }}
        run: python parker_auto.py

      - name: Upload screenshot hvis fejl
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fejl-screenshot
          path: "*.png"
          if-no-files-found: ignore

      - name: Gem verified_plates.json
        run: |
          git config user.name  "Parkering Bot"
          git config user.email "bot@parkering"
          git add verified_plates.json
          git diff --cached --quiet || git commit -m "✅ Opdater verificerede nummerplader"
          git push
